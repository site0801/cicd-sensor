---
name: Release Sensor

# Tag-triggered release workflow. Produces binary-only GitHub Release tarballs,
# SHA256 checksums, cosign keyless signature bundles, and GHCR images.
#
# Verify a tarball:
#   cosign verify-blob \
#     --bundle cicd-sensor_<version>_linux_amd64.tar.gz.sigstore.json \
#     --certificate-identity \
#       https://github.com/cicd-sensor/cicd-sensor/.github/workflows/releases-sensor.yaml@refs/tags/releases/v<version> \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     cicd-sensor_<version>_linux_amd64.tar.gz
"on":
  push:
    tags:
      - "releases/v*"

permissions:
  contents: read

jobs:
  # Run the same CI checks (lint, unit tests, build sanity) the
  # branch sees on every PR / main push before any release artifact
  # is produced.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yaml

  # Real-kernel integration tests on multiple kernels. A release tag
  # waits for this to succeed so we never publish binaries that fail
  # the BPF verifier on a supported kernel.
  bpf-integration:
    name: BPF integration gate
    uses: ./.github/workflows/bpf-cross-kernel.yaml

  build:
    name: Build release binaries
    needs: [ci, bpf-integration]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        env:
          REF_TAG: ${{ github.ref_name }}
        run: |
          ref_tag="${REF_TAG}"
          case "$ref_tag" in
            releases/v*) ;;
            *) echo "::error::release tag must match releases/v*: $ref_tag"; exit 1 ;;
          esac
          version_tag="${ref_tag#releases/}"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "version=${version_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux binaries
        run: make build VERSION="${{ steps.release.outputs.version_tag }}"

      - name: Build cicd-sensorctl macOS/Windows binaries
        run: make build-ctl-cross VERSION="${{ steps.release.outputs.version_tag }}"

      - name: Package tarballs
        run: |
          set -eu
          mkdir -p release
          version="${{ steps.release.outputs.version }}"

          for arch in amd64 arm64; do
            pkg="release/pkg-linux-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensor_linux_${arch}" "$pkg/cicd-sensor-linux-${arch}"
            install -m 755 "dist/cicd-sensorctl_linux_${arch}" "$pkg/cicd-sensorctl-linux-${arch}"
            install -m 755 "dist/cicd-sensor-manager_linux_${arch}" "$pkg/cicd-sensor-manager-linux-${arch}"
            tarball="release/cicd-sensor_${version}_linux_${arch}.tar.gz"
            tar -C "$pkg" -czf "$tarball" .
            ls -lh "$tarball"
          done

          for arch in amd64 arm64; do
            pkg="release/pkg-darwin-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensorctl_darwin_${arch}" "$pkg/cicd-sensorctl-darwin-${arch}"
            tarball="release/cicd-sensorctl_${version}_darwin_${arch}.tar.gz"
            tar -C "$pkg" -czf "$tarball" .
            ls -lh "$tarball"
          done

          for arch in amd64 arm64; do
            pkg="release/pkg-windows-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensorctl_windows_${arch}.exe" "$pkg/cicd-sensorctl-windows-${arch}.exe"
            zipfile="cicd-sensorctl_${version}_windows_${arch}.zip"
            (cd "$pkg" && zip -q "../../release/${zipfile}" .)
            ls -lh "release/${zipfile}"
          done

      - name: Upload archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-tarballs
          path: |
            release/cicd-sensor_*.tar.gz
            release/cicd-sensorctl_*.tar.gz
            release/cicd-sensorctl_*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    environment: sensor-releases
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: release
        env:
          REF_TAG: ${{ github.ref_name }}
        run: |
          ref_tag="${REF_TAG}"
          case "$ref_tag" in
            releases/v*) ;;
            *) echo "::error::release tag must match releases/v*: $ref_tag"; exit 1 ;;
          esac
          version_tag="${ref_tag#releases/}"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"

      - name: Download tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-tarballs
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum cicd-sensor_*.tar.gz cicd-sensorctl_*.tar.gz cicd-sensorctl_*.zip > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign archives and checksums
        run: |
          cd dist
          for file in cicd-sensor_*.tar.gz cicd-sensorctl_*.tar.gz cicd-sensorctl_*.zip checksums.txt; do
            cosign sign-blob --bundle "${file}.sigstore.json" "$file"
          done
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          gh release create "${{ steps.release.outputs.ref_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${{ steps.release.outputs.version_tag }}" \
            --generate-notes \
            --verify-tag \
            cicd-sensor_*.tar.gz \
            cicd-sensorctl_*.tar.gz \
            cicd-sensorctl_*.zip \
            checksums.txt \
            *.sigstore.json

  image:
    name: Image (${{ matrix.image }})
    needs: build
    runs-on: ubuntu-24.04
    environment: sensor-releases
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cicd-sensor-agent
            dockerfile: Dockerfile.agent
          - image: cicd-sensor-manager
            dockerfile: Dockerfile.manager
          - image: cicd-sensor-manager-lambda
            dockerfile: Dockerfile.manager.lambda
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve release tag
        id: release
        env:
          REF_TAG: ${{ github.ref_name }}
        run: |
          ref_tag="${REF_TAG}"
          case "$ref_tag" in
            releases/v*) ;;
            *) echo "::error::release tag must match releases/v*: $ref_tag"; exit 1 ;;
          esac
          version_tag="${ref_tag#releases/}"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.image }}
          TAG: ${{ steps.release.outputs.version_tag }}
        run: |
          tags="ghcr.io/cicd-sensor/${IMAGE}:${TAG}"
          if [[ "$TAG" != *-* ]]; then
            tags+=$'\n'"ghcr.io/cicd-sensor/${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build_and_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.release.outputs.version_tag }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        run: |
          cosign sign --yes \
            "ghcr.io/cicd-sensor/${{ matrix.image }}@${{ steps.build_and_push.outputs.digest }}"
