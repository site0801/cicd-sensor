---
name: Release Sensor

# Dispatch-driven release workflow. Triggered from the GitHub Actions UI
# with a semver `version` input. Produces binary-only GitHub Release
# tarballs, SHA256 checksums, cosign keyless signature bundles, a
# CycloneDX SBOM, and GHCR images, all bound to three GitHub Artifact
# Attestations (CycloneDX SBOM, SLSA build provenance, and an in-toto
# runtime-trace predicate emitted by cicd-sensor itself).
#
# Verify a tarball (Sigstore bundle):
#   cosign verify-blob \
#     --bundle cicd-sensor_<version>_linux_amd64.tar.gz.sigstore.json \
#     --certificate-identity \
#       https://github.com/cicd-sensor/cicd-sensor/.github/workflows/releases-sensor.yaml@refs/heads/main \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-github-workflow-trigger workflow_dispatch \
#     --certificate-github-workflow-repository cicd-sensor/cicd-sensor \
#     cicd-sensor_<version>_linux_amd64.tar.gz
#
# Verify the three attestations:
#   gh attestation verify cicd-sensor_<version>_linux_amd64.tar.gz \
#     --owner cicd-sensor \
#     --predicate-type https://cyclonedx.org/bom/v1.6
#   gh attestation verify cicd-sensor_<version>_linux_amd64.tar.gz \
#     --owner cicd-sensor \
#     --predicate-type https://slsa.dev/provenance/v1
#   gh attestation verify cicd-sensor_<version>_linux_amd64.tar.gz \
#     --owner cicd-sensor \
#     --predicate-type https://in-toto.io/attestation/runtime-trace/v0.1
"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.0.11)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      version_tag: ${{ steps.parse.outputs.version_tag }}
      ref_tag: ${{ steps.parse.outputs.ref_tag }}
    steps:
      - name: Parse and validate version
        id: parse
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must match vX.Y.Z (semver), got '$VERSION'"
            exit 1
          fi
          ref_tag="releases/$VERSION"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"

  # Run the same CI checks (lint, unit tests, build sanity) the
  # branch sees on every PR / main push before any release artifact
  # is produced.
  ci:
    name: CI gate
    needs: [validate]
    uses: ./.github/workflows/ci.yaml

  # Real-kernel integration tests on multiple kernels. A release
  # waits for this to succeed so we never publish binaries that fail
  # the BPF verifier on a supported kernel.
  bpf-integration:
    name: BPF integration gate
    needs: [validate]
    uses: ./.github/workflows/bpf-cross-kernel.yaml

  blacksmith-bpf-integration:
    name: Blacksmith BPF integration gate
    needs: [validate]
    uses: ./.github/workflows/blacksmith-bpf-integration.yaml

  approval:
    name: Approve release
    needs: [validate, ci, bpf-integration, blacksmith-bpf-integration]
    runs-on: ubuntu-24.04
    environment: sensor-releases/approval
    permissions:
      contents: read
    steps:
      - name: Approved
        run: echo "approved ${{ needs.validate.outputs.version_tag }}"

  build:
    name: Build release binaries
    needs: [validate, approval]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # cicd-sensor-action's predicate generation uses these to fetch
      # config from the calling repo via the Contents API and to upload
      # the cicd-sensor-attestation artifact.
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Self-monitor the release build. The post step uploads the
      # cicd-sensor-attestation artifact (containing predicate.json)
      # at job end, which the downstream sign-tarballs and image
      # jobs sign with actions/attest as a runtime-trace attestation.
      - name: Start cicd-sensor (self-monitoring)
        uses: cicd-sensor/cicd-sensor-action@31366296cb918b7f1413829aafc16dcf18fe8518 # v0.0.35

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binaries
        run: make build VERSION="${{ needs.validate.outputs.version_tag }}"

      - name: Build cicd-sensorctl macOS/Windows binaries
        run: make build-ctl-cross VERSION="${{ needs.validate.outputs.version_tag }}"

      - name: Package tarballs
        run: |
          set -eu
          mkdir -p release
          version="${{ needs.validate.outputs.version }}"

          for arch in amd64 arm64; do
            pkg="release/pkg-linux-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensor_linux_${arch}" "$pkg/cicd-sensor-linux-${arch}"
            install -m 755 "dist/cicd-sensorctl_linux_${arch}" "$pkg/cicd-sensorctl-linux-${arch}"
            install -m 755 "dist/cicd-sensor-manager_linux_${arch}" "$pkg/cicd-sensor-manager-linux-${arch}"
            tarball="release/cicd-sensor_${version}_linux_${arch}.tar.gz"
            tar -C "$pkg" -czf "$tarball" .
            ls -lh "$tarball"
          done

          for arch in amd64 arm64; do
            pkg="release/pkg-darwin-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensorctl_darwin_${arch}" "$pkg/cicd-sensorctl-darwin-${arch}"
            tarball="release/cicd-sensorctl_${version}_darwin_${arch}.tar.gz"
            tar -C "$pkg" -czf "$tarball" .
            ls -lh "$tarball"
          done

          for arch in amd64 arm64; do
            pkg="release/pkg-windows-${arch}"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            install -m 755 "dist/cicd-sensorctl_windows_${arch}.exe" "$pkg/cicd-sensorctl-windows-${arch}.exe"
            zipfile="cicd-sensorctl_${version}_windows_${arch}.zip"
            (cd "$pkg" && zip -qr "../../release/${zipfile}" .)
            ls -lh "release/${zipfile}"
          done

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./
          format: cyclonedx-json
          output-file: release/cicd-sensor_${{ needs.validate.outputs.version }}_sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-tarballs
          path: |
            release/cicd-sensor_*.tar.gz
            release/cicd-sensorctl_*.tar.gz
            release/cicd-sensorctl_*.zip
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom
          path: release/cicd-sensor_*_sbom.cdx.json
          if-no-files-found: error

  sign-tarballs:
    name: Sign and attest tarballs
    needs: [validate, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-tarballs
          path: dist

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sbom
          path: dist

      - name: Download cicd-sensor runtime-trace predicate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cicd-sensor-attestation
          path: trace

      - name: Generate checksums
        run: |
          cd dist
          sha256sum cicd-sensor_*.tar.gz cicd-sensorctl_*.tar.gz cicd-sensorctl_*.zip cicd-sensor_*_sbom.cdx.json > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign archives, SBOM, and checksums
        run: |
          cd dist
          for file in cicd-sensor_*.tar.gz cicd-sensorctl_*.tar.gz cicd-sensorctl_*.zip cicd-sensor_*_sbom.cdx.json checksums.txt; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
          ls -la

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
          sbom-path: dist/cicd-sensor_${{ needs.validate.outputs.version }}_sbom.cdx.json

      - name: Attest SLSA build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest runtime-trace (cicd-sensor)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
          predicate-type: https://in-toto.io/attestation/runtime-trace/v0.1
          predicate-path: trace/predicate.json

      - name: Upload signed release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-signed
          path: |
            dist/cicd-sensor_*.tar.gz
            dist/cicd-sensorctl_*.tar.gz
            dist/cicd-sensorctl_*.zip
            dist/cicd-sensor_*_sbom.cdx.json
            dist/checksums.txt
            dist/*.sigstore.json
          if-no-files-found: error

  image:
    name: Image (${{ matrix.image }})
    needs: [validate, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cicd-sensor-agent
            dockerfile: Dockerfile.agent
          - image: cicd-sensor-manager
            dockerfile: Dockerfile.manager
          - image: cicd-sensor-manager-lambda
            dockerfile: Dockerfile.manager.lambda
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sbom
          path: dist

      - name: Download cicd-sensor runtime-trace predicate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cicd-sensor-attestation
          path: trace

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.image }}
          TAG: ${{ needs.validate.outputs.version_tag }}
        run: |
          tags="ghcr.io/cicd-sensor/${IMAGE}:${TAG}"
          if [[ "$TAG" != *-* ]]; then
            tags+=$'\n'"ghcr.io/cicd-sensor/${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build_and_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version_tag }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        run: |
          cosign sign --yes \
            "ghcr.io/cicd-sensor/${{ matrix.image }}@${{ steps.build_and_push.outputs.digest }}"

      - name: Attest SBOM (image)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/cicd-sensor/${{ matrix.image }}
          subject-digest: ${{ steps.build_and_push.outputs.digest }}
          sbom-path: dist/cicd-sensor_${{ needs.validate.outputs.version }}_sbom.cdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest SLSA build provenance (image)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/cicd-sensor/${{ matrix.image }}
          subject-digest: ${{ steps.build_and_push.outputs.digest }}
          push-to-registry: true
          create-storage-record: true

      - name: Attest runtime-trace (image)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/cicd-sensor/${{ matrix.image }}
          subject-digest: ${{ steps.build_and_push.outputs.digest }}
          predicate-type: https://in-toto.io/attestation/runtime-trace/v0.1
          predicate-path: trace/predicate.json
          push-to-registry: true
          create-storage-record: false

  finalize:
    name: Tag and publish GitHub Release
    needs: [validate, sign-tarballs, image]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # We will push a new annotated tag back to the remote.
          persist-credentials: true

      - name: Download signed release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-signed
          path: dist

      - name: Create annotated tag as dispatcher
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
          REF_TAG: ${{ needs.validate.outputs.ref_tag }}
          VERSION_TAG: ${{ needs.validate.outputs.version_tag }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -eu
          git config user.name  "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          current_commit=$(git rev-parse HEAD)
          if git ls-remote --exit-code --tags origin "refs/tags/${REF_TAG}" >/dev/null; then
            git fetch --no-tags --force origin "refs/tags/${REF_TAG}:refs/tags/${REF_TAG}"
            tag_commit=$(git rev-parse "${REF_TAG}^{commit}")
            if [ "$tag_commit" != "$current_commit" ]; then
              echo "::error::tag ${REF_TAG} already exists at ${tag_commit}, not ${current_commit}"
              exit 1
            fi
            echo "::notice::tag ${REF_TAG} already exists at ${current_commit}; reusing it"
            exit 0
          fi
          git tag -a "$REF_TAG" \
            -m "Release ${VERSION_TAG} dispatched by @${ACTOR} (run ${RUN_ID})"
          git push origin "refs/tags/${REF_TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_TAG: ${{ needs.validate.outputs.ref_tag }}
          VERSION_TAG: ${{ needs.validate.outputs.version_tag }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if gh release view "$REF_TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::notice::release ${REF_TAG} already exists; skipping release creation"
            exit 0
          fi
          cd dist
          notes="Released by @${ACTOR} via [workflow run](${RUN_URL})."
          gh release create "$REF_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$VERSION_TAG" \
            --notes "$notes" \
            --verify-tag \
            cicd-sensor_*.tar.gz \
            cicd-sensorctl_*.tar.gz \
            cicd-sensorctl_*.zip \
            cicd-sensor_*_sbom.cdx.json \
            checksums.txt \
            *.sigstore.json

  bump-action:
    name: Kick Renovate on cicd-sensor-action
    needs: [finalize]
    runs-on: ubuntu-24.04
    environment: sensor-releases/bump-action
    continue-on-error: true
    permissions:
      contents: read
    steps:
      # Kick Renovate on cicd-sensor-action so its `cicd-sensor-version`
      # input default in action.yml gets bumped to this release without
      # waiting for the Mend Renovate App's default poll cycle.
      # Toggles the "manual job" checkbox on the Dependency Dashboard
      # issue via the cicd-sensor-action-bump GitHub App.
      - name: Mint GitHub App token (cicd-sensor-action-bump)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ACTION_BUMP_APP_CLIENT_ID }}
          private-key: ${{ secrets.ACTION_BUMP_APP_PRIVATE_KEY }}
          owner: cicd-sensor
          repositories: cicd-sensor-action

      - name: Kick Renovate on cicd-sensor-action
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION_TAG: ${{ inputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          target="cicd-sensor/cicd-sensor-action"
          issue_num=$(gh issue list --repo "$target" --state open \
            --search 'in:title "Dependency Dashboard"' \
            --json number,title \
            --jq '.[] | select(.title == "Dependency Dashboard") | .number' \
            | head -1)
          if [ -z "$issue_num" ]; then
            echo "::warning::no Renovate Dashboard issue on ${target} yet; Mend may still be initialising"
            exit 0
          fi
          body=$(gh issue view "$issue_num" --repo "$target" --json body --jq .body)
          new_body=$(printf '%s' "$body" | sed 's|- \[ \] <!-- manual job -->|- [x] <!-- manual job -->|')
          if [ "$body" = "$new_body" ]; then
            echo "::notice::manual job checkbox already toggled or marker missing on ${target}"
            exit 0
          fi
          printf '%s' "$new_body" | gh issue edit "$issue_num" --repo "$target" --body-file -
          echo "::notice::kicked Renovate on ${target} for ${VERSION_TAG} (from ${RUN_URL})"
