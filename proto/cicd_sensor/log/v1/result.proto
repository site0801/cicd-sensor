syntax = "proto3";

package cicd_sensor.log.v1;

import "cicd_sensor/log/v1/common.proto";
import "google/protobuf/timestamp.proto";

message JobResultLogEntry {
  google.protobuf.Timestamp timestamp = 1 [json_name = "timestamp"];
  // UUIDv7 for this result log row.
  optional string log_id = 2 [json_name = "log_id"];
  JobLogContext job = 3 [json_name = "job"];
  optional string scope = 4 [json_name = "scope"];
  optional string config_revision = 5 [json_name = "config_revision"];
  repeated RulesetUse rulesets = 6 [json_name = "rulesets"];
  repeated RuleModifierUse rule_modifiers = 7 [json_name = "rule_modifiers"];
  repeated string network_connects = 8 [json_name = "network_connects"];
  repeated string domains = 9 [json_name = "domains"];
  repeated DetectedRuleSummary detections = 10 [json_name = "detections"];
  optional uint32 events_total = 11 [json_name = "events_total"];
  optional uint32 events_dropped = 12 [json_name = "events_dropped"];
  optional string finalize_reason = 13 [json_name = "finalize_reason"];
}

message RulesetUse {
  optional string ruleset_id = 1 [json_name = "ruleset_id"];
  optional string revision = 2 [json_name = "revision"];
}

message RuleModifierUse {
  optional string modifier_id = 1 [json_name = "modifier_id"];
  optional string revision = 2 [json_name = "revision"];
}

message DetectedRuleSummary {
  optional string ruleset_id = 1 [json_name = "ruleset_id"];
  optional string rule_id = 2 [json_name = "rule_id"];
  optional string ruleset_revision = 3 [json_name = "ruleset_revision"];
  optional string action = 4 [json_name = "action"];
  optional uint32 count = 5 [json_name = "count"];
}
