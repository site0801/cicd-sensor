---
name: BPF Integration x64

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kernel:
    name: "x64 kernel ${{ matrix.kernel.label }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Pin LVH kernel image tags so upstream rebuilds cannot silently
        # change the verifier target. Bump by checking quay.io/lvh-images/kind.
        # LVH runs on GitHub-hosted x64 runners because KVM access and the
        # published kind images are x64-only in this workflow.
        kernel:
          - label: "5.15"
            version: "5.15-20260416.033356"
          - label: "6.18"
            version: "6.18-20260504.013701"
    env:
      LVH_IMAGE: kind
      INTEGRATION_TEST_BIN: _lvh/tests/kerneltracker.test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install BPF build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm

      - name: Enable KVM for LVH
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Environment info
        run: |
          {
            echo "## Host environment for kernel ${{ matrix.kernel.label }}"
            echo '```'
            uname -a
            cat /etc/os-release
            go version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Verify generated BPF bindings
        run: |
          make generate-bpf
          # Only check Go bindings. The .o file can differ by clang/llvm-strip
          # metadata across runners even when embedded program bytes are stable.
          if ! git diff --exit-code 'internal/agent/bpf/generated/*.go'; then
            echo "::error::BPF Go bindings drifted. Run 'make generate-bpf' locally and commit."
            exit 1
          fi

      - name: Build integration test binary
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p _lvh/tests
          make test-integration-compile INTEGRATION_TEST_BIN="$INTEGRATION_TEST_BIN"
          file "$INTEGRATION_TEST_BIN" | tee -a "$GITHUB_STEP_SUMMARY"
          if ! file "$INTEGRATION_TEST_BIN" | grep -q 'statically linked'; then
            echo "::error::integration test binary is not statically linked; LVH rootfs cannot run it"
            exit 1
          fi

      - name: "Run integration tests on kernel ${{ matrix.kernel.label }}"
        uses: cilium/little-vm-helper@ad43ff511dd5365a0011ae9f864ec959c36daebf # v0.0.28
        with:
          test-name: "bpf-integration-${{ matrix.kernel.label }}"
          image: ${{ env.LVH_IMAGE }}
          image-version: ${{ matrix.kernel.version }}
          host-mount: ./
          install-dependencies: 'true'
          # LVH interpolates this through a shell; escape literal $ as \$.
          # The kind rootfs is minimal, so install DNS/NSS packages for DNS and
          # systemd-resolved tests. Use /dev/shm to avoid overlayfs dentries in
          # file path tests.
          cmd: |
            set -eo pipefail
            cd /host
            mkdir -p /host/_lvh/logs
            log=/host/_lvh/logs/bpf-integration-${{ matrix.kernel.label }}.log
            : >"\$log"
            uname -a | tee -a "\$log"
            test -e /sys/kernel/btf/vmlinux && echo "BTF: present" | tee -a "\$log"
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -q | tee -a "\$log"
            apt-get install -y -q dnsutils libnss-resolve | tee -a "\$log"
            export TMPDIR=/dev/shm
            /host/${{ env.INTEGRATION_TEST_BIN }} -test.v -test.count=1 -test.timeout=15m 2>&1 | tee -a "\$log"

      - name: Reject unexpected skips
        run: |
          log="_lvh/logs/bpf-integration-${{ matrix.kernel.label }}.log"
          if [ ! -s "$log" ]; then
            echo "::error::LVH log not produced at $log"
            exit 1
          fi
          skips="$(grep -E '^[[:space:]]*--- SKIP:' "$log" \
            | grep -v 'real_var_run_real_docker_sock_if_proxy_deployed' || true)"
          if [ -n "$skips" ]; then
            {
              echo "## Skipped tests on LVH ${{ matrix.kernel.label }}"
              echo '```'
              printf '%s\n' "$skips"
              echo '```'
            } | tee -a "$GITHUB_STEP_SUMMARY"
            echo "::error::LVH ${{ matrix.kernel.label }} run contains skipped tests."
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "bpf-integration-${{ matrix.kernel.label }}"
          path: "_lvh/logs/*.log"
          if-no-files-found: ignore
