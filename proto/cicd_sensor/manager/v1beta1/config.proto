// ConfigService distributes rule/output config to host and project scopes.
// Manager is stateless: every call authenticates and returns a fresh bundle.
syntax = "proto3";

package cicd_sensor.manager.v1beta1;

import "cicd_sensor/manager/v1beta1/types.proto";

// ConfigService is the rule/output config distribution plane.
//
// Auth (v1):
//   - host scope:    Authorization: Bearer sk_cs_<secret>
//   - project scope: Authorization: Bearer sk_cs_<secret>
//     The project CLI reads CICD_SENSOR_MANAGER_TOKEN from env and forwards it
//     via the local socket body. The agent then sets the bearer header when
//     calling the manager.
service ConfigService {
  // FetchConfig authenticates the caller and returns the config bundle
  // visible to that caller. The manager does not generate ResolvedRules;
  // the agent merges the returned sets/modifiers with local rule inputs.
  rpc FetchConfig(FetchConfigRequest) returns (FetchConfigResponse);
}

// RequestedOutputs indicates which logs the caller will upload,
// so the manager can tailor output policy for those types.
message RequestedOutputs {
  bool summary = 1;
  bool detection = 2;
  bool runtime_event = 3;
}

// ARCScaleSet identifies one Actions Runner Controller
// `gha-runner-scale-set` release. It mirrors the two labels the ARC
// controller writes onto every runner pod
// (actions.github.com/scale-set-namespace and
// actions.github.com/scale-set-name) and lets the manager return
// per-scale-set host scope config so different scale-sets on the same
// cluster can carry different rules and outputs.
//
// Empty (zero) ARCScaleSet means single-scale-set: every job on the agent
// shares one host scope configuration. Non-ARC runner environments always
// send the zero value.
message ARCScaleSet {
  string namespace = 1;
  string name = 2;
}

// FetchConfigRequest is the FetchConfig input. Auth is carried in headers,
// not in the body.
message FetchConfigRequest {
  // RunnerType is the agent-process-wide runner type ("machine" for VM /
  // physical server, "kubernetes" for a Pod) that helps the manager route
  // the request.
  string runner_type = 1;
  JobIdentity job_identity = 2;
  RequestedOutputs requested_outputs = 3;
  // ARC scale-set identity for per-scale-set host scope isolation.
  // Optional; the zero value selects single-scale-set config.
  ARCScaleSet arc_scale_set = 4;
}

// ServedConfig is the non-rule config portion returned to the agent.
message ServedConfig {
  string config_revision = 1;
  int32 default_max_alerts_per_rule = 2;
  OutputSettings output_settings = 3;
  bool monitor_mode = 4;
}

// FetchConfigResponse is the FetchConfig output.
message FetchConfigResponse {
  ServedConfig config = 1;
  repeated RuleSource rule_sources = 2;
}
