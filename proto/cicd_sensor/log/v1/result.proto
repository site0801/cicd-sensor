syntax = "proto3";

package cicd_sensor.log.v1;

import "buf/validate/validate.proto";
import "cicd_sensor/log/v1/common.proto";
import "google/protobuf/timestamp.proto";

message JobResultLogEntry {
  google.protobuf.Timestamp timestamp = 1 [json_name = "timestamp"];
  optional string log_type = 2 [json_name = "log_type"];
  optional string schema_version = 3 [json_name = "schema_version", (buf.validate.field).string.const = "v1"];
  optional string agent_version = 4 [json_name = "agent_version"];
  // UUIDv7 for this result log row.
  optional string log_id = 5 [json_name = "log_id"];
  JobLogContext job = 6 [json_name = "job"];
  optional string scope = 7 [json_name = "scope"];
  optional string runner_kind = 8 [json_name = "runner_kind"];
  optional string config_revision = 9 [json_name = "config_revision"];
  repeated RulesetUse rulesets = 10 [json_name = "rulesets"];
  repeated RuleModifierUse rule_modifiers = 11 [json_name = "rule_modifiers"];
  repeated string network_connects = 12 [json_name = "network_connects"];
  repeated string domains = 13 [json_name = "domains"];
  repeated DetectedRuleSummary detections = 14 [json_name = "detections"];
  optional uint32 events_total = 15 [json_name = "events_total"];
  optional uint32 events_dropped = 16 [json_name = "events_dropped"];
  google.protobuf.Timestamp start_time = 17 [json_name = "start_time"];
  google.protobuf.Timestamp end_time = 18 [json_name = "end_time"];
  optional int64 duration_s = 19 [json_name = "duration_s"];
  optional string finalize_reason = 20 [json_name = "finalize_reason"];
}

message RulesetUse {
  optional string ruleset_id = 1 [json_name = "ruleset_id"];
  optional string revision = 2 [json_name = "revision"];
}

message RuleModifierUse {
  optional string modifier_id = 1 [json_name = "modifier_id"];
  optional string revision = 2 [json_name = "revision"];
}

message DetectedRuleSummary {
  optional string ruleset_id = 1 [json_name = "ruleset_id"];
  optional string rule_id = 2 [json_name = "rule_id"];
  optional string ruleset_revision = 3 [json_name = "ruleset_revision"];
  optional string action = 4 [json_name = "action"];
  optional uint32 count = 5 [json_name = "count"];
}
