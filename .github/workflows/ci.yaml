---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  # Allow release-sensor (and other workflows) to reuse this as a gate.
  workflow_call:

permissions:
  contents: read

concurrency:
  # Coalesce reruns of the same ref while a PR is iterating, but never
  # cancel a main-branch run mid-flight.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          set -eu
          files=$(find . -type f -name '*.go' -not -path './vendor/*')
          unformatted=$(printf '%s\n' "$files" | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            echo "::error::gofmt found unformatted files; run 'gofmt -w' on them"
            exit 1
          fi

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: Tests
        run: make test

      - name: Validate rules
        run: make rules-validate

      - name: Validate rules bundle
        run: make rules-bundle-validate

      - name: Compile integration test binary
        # The LVH-based bpf-cross-kernel workflow runs the integration
        # tests against real kernels. Here we only verify the binary
        # still compiles so a build-time regression fails fast on PRs.
        run: make test-integration-compile

      - name: Build linux release binaries
        run: make build

      - name: Build cicd-sensorctl macOS/Windows binaries
        run: make build-ctl-cross
