syntax = "proto3";

package cicd_sensor.log.v1;

import "buf/validate/validate.proto";
import "cicd_sensor/log/v1/common.proto";
import "google/protobuf/timestamp.proto";

message JobDetectionLogEntry {
  google.protobuf.Timestamp timestamp = 1 [json_name = "timestamp"];
  optional string log_type = 2 [json_name = "log_type"];
  optional string schema_version = 3 [json_name = "schema_version", (buf.validate.field).string.const = "v1"];
  optional string agent_version = 4 [json_name = "agent_version"];
  // UUIDv7 for this detection log row.
  optional string log_id = 5 [json_name = "log_id"];
  JobLogContext job = 6 [json_name = "job"];
  optional string scope = 7 [json_name = "scope"];
  optional string config_revision = 8 [json_name = "config_revision"];
  optional string ruleset_id = 9 [json_name = "ruleset_id"];
  optional string rule_id = 10 [json_name = "rule_id"];
  optional string ruleset_revision = 11 [json_name = "ruleset_revision"];
  optional string rule_name = 12 [json_name = "rule_name"];
  optional string rule_description = 13 [json_name = "rule_description"];
  optional string action = 14 [json_name = "action"];
  optional string rule_alert_truncation = 15 [json_name = "rule_alert_truncation"];
  EventRecord event = 16 [json_name = "event"];
}
