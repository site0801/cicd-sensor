rule_sets:
  - ruleset_id: cicd-sensor/testevent
    rules:
      - rule_id: testevent_domain_lookup
        rule_name: "Testevent: cicd-sensor canary domain looked up"
        event_kind: domain
        condition: domain == "testevent.cicd-sensor.com"
        action: detect
        tags:
          category: testevent

      - rule_id: testevent_file_write
        rule_name: "Testevent: cicd-sensor canary file written"
        event_kind: file_open
        condition: is_write && path.endsWith("/cicd-sensor-testevent.txt")
        action: detect
        tags:
          category: testevent
