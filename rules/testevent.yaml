rule_sets:
  - ruleset_id: cicd_sensor_baseline/testevent

    rules:
      - rule_id: domain_lookup
        rule_name: "Testevent: cicd-sensor canary domain looked up"
        description: |
          What:
            Detects the synthetic canary domain lookup event.
          Why:
            This verifies that domain lookup telemetry and rule evaluation are working.
          Notes:
            This is a self-test rule, not a security detection.
        event_type: domain
        condition: domain == "testevent.cicd-sensor.com"
        action: detect

      - rule_id: file_write
        rule_name: "Testevent: cicd-sensor canary file written"
        description: |
          What:
            Detects the synthetic canary file write event.
          Why:
            This verifies that file write telemetry and rule evaluation are working.
          Notes:
            This is a self-test rule, not a security detection.
        event_type: file_open
        condition: is_write && path.endsWith("/cicd-sensor-testevent.txt")
        action: detect
