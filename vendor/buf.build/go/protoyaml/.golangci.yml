version: "2"
linters:
  default: all
  disable:
    - cyclop            # covered by gocyclo
    - err113            # way too noisy
    - exhaustive
    - exhaustruct
    - funlen            # rely on code review to limit function length
    - gochecknoglobals
    - gocognit          # dubious "cognitive overhead" quantification
    - inamedparam       # not standard style
    - interfacebloat    # many exceptions
    - ireturn           # "accept interfaces, return structs" isn't ironclad
    - lll               # don't want hard limits for line length
    - maintidx          # covered by gocyclo
    - mnd
    - nilnil            # allow this
    - nlreturn          # generous whitespace violates house style
    - noinlineerr       # if err := ...; err != nil is idiomatic Go
    - nonamedreturns
    - testifylint       # does not want us to use assert
    - testpackage       # internal tests are fine
    - thelper           # we want to print out the whole stack
    - wrapcheck         # don't _always_ need to wrap errors
    - wsl               # generous whitespace violates house style
    - wsl_v5            # generous whitespace violates house style
  settings:
    depguard:
      rules:
        Main:
          files:
            - $all
            - '!$test'
          allow:
            - $gostd
            - github.com/bufbuild/protoyaml-go/decode
            - buf.build/gen/go/bufbuild/protovalidate
            - buf.build/go/protovalidate
            - go.yaml.in/yaml/v3
            - google.golang.org/protobuf
    errcheck:
      check-type-assertions: true
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print
        - pattern: ^log\.
        - pattern: ^print$
        - pattern: ^println$
        - pattern: ^panic$
    gocyclo:
      min-complexity: 15
    godox:
      keywords:
        - FIXME
    varnamelen:
      ignore-decls:
        - T any
        - i int
        - ok bool
        - wg sync.WaitGroup
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - nestif
        path: _test.go
      - linters:
          - depguard
          - forbidigo
          - revive
        path: internal/*
      - linters:
          - gosec
          - gosmopolitan
          - prealloc
        path: internal/protoyamltest/*
      - linters:
          - gosec
        path: internal/cmd/generate-txt-testdata/*
      - path: (.+)\.go$
        text: do not define dynamic errors.*
      - linters:
          - revive
          - staticcheck
        text: "error.*capitalized"
      - linters:
          - staticcheck
        text: "QF1008"
      - linters:
          - staticcheck
        text: "QF1001"
issues:
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
  exclusions:
    generated: lax
