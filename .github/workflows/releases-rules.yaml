---
name: Release Rules

# Dispatch-driven rules release workflow. Triggered from the GitHub
# Actions UI with a `version` input (rules calendar versioning,
# e.g. v20260522-001). Publishes the baseline rules bundle as a
# signed OCI artifact to GHCR / Quay / GitLab and binds the GHCR
# artifact to GitHub Artifact Attestations.

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Rules version (e.g. v20260522-001)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-baseline-rules-${{ inputs.version }}
  cancel-in-progress: false

env:
  LAYER_MEDIA_TYPE: application/vnd.cicd-sensor.baseline.rules.v1+yaml+gzip
  GHCR_REPOSITORY: ghcr.io/cicd-sensor/cicd-sensor-rules
  QUAY_REPOSITORY: quay.io/cicd-sensor/cicd-sensor-rules
  GITLAB_REPOSITORY: registry.gitlab.com/cicd-sensor/cicd-sensor-rules

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      ref_tag: ${{ steps.parse.outputs.ref_tag }}
    steps:
      - name: Parse and validate version
        id: parse
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]{8}-[0-9]{3}$ ]]; then
            echo "::error::version must match vYYYYMMDD-NNN, got '$VERSION'"
            exit 1
          fi
          ref_tag="rules/$VERSION"
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${ref_tag}" --silent >/dev/null 2>&1; then
            echo "::error::tag '$ref_tag' already exists; pick a fresh version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"

  build-rules:
    name: Build rules bundle
    needs: [validate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build rules bundle
        run: |
          make rules-bundle-validate RULE_BUNDLE="${RUNNER_TEMP}/baseline-rules.yaml"
          gzip -n -c "${RUNNER_TEMP}/baseline-rules.yaml" > "${RUNNER_TEMP}/baseline-rules.yaml.gz"

      - name: Upload rules bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rules-bundle
          path: ${{ runner.temp }}/baseline-rules.yaml.gz
          if-no-files-found: error

  publish:
    name: Publish and attest rules artifact
    needs: [validate, build-rules]
    runs-on: ubuntu-24.04
    environment: rules-releases
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download rules bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rules-bundle
          path: dist

      - name: Prepare OCI config
        run: |
          printf '{}' > dist/config.json

      - name: Verify registry credentials
        env:
          QUAY_USERNAME: ${{ vars.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          GITLAB_USERNAME: ${{ vars.GITLAB_USERNAME }}
          GITLAB_PASSWORD: ${{ secrets.GITLAB_PASSWORD }}
        run: |
          test -n "$QUAY_USERNAME" || { echo "::error::QUAY_USERNAME environment variable is not configured"; exit 1; }
          test -n "$QUAY_PASSWORD" || { echo "::error::QUAY_PASSWORD environment secret is not configured"; exit 1; }
          test -n "$GITLAB_USERNAME" || { echo "::error::GITLAB_USERNAME environment variable is not configured"; exit 1; }
          test -n "$GITLAB_PASSWORD" || { echo "::error::GITLAB_PASSWORD environment secret is not configured"; exit 1; }

      - name: Login to registries
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUAY_USERNAME: ${{ vars.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          GITLAB_USERNAME: ${{ vars.GITLAB_USERNAME }}
          GITLAB_PASSWORD: ${{ secrets.GITLAB_PASSWORD }}
        run: |
          printf '%s' "$GHCR_TOKEN" |
            oras login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          printf '%s' "$GHCR_TOKEN" |
            docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          printf '%s' "$QUAY_PASSWORD" |
            oras login quay.io --username "$QUAY_USERNAME" --password-stdin
          printf '%s' "$GITLAB_PASSWORD" |
            oras login registry.gitlab.com --username "$GITLAB_USERNAME" --password-stdin

      - name: Push versioned rules artifact
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cd dist
          for repo in "$GHCR_REPOSITORY" "$QUAY_REPOSITORY"; do
            oras push "${repo}:${RULES_VERSION}" \
              --artifact-type "application/vnd.cicd-sensor.baseline.rules.config.v1+json" \
              --annotation "org.opencontainers.image.version=${RULES_VERSION}" \
              "baseline-rules.yaml.gz:${LAYER_MEDIA_TYPE}"
          done
          oras push "${GITLAB_REPOSITORY}:${RULES_VERSION}" \
            --annotation "org.opencontainers.image.version=${RULES_VERSION}" \
            --config "config.json:application/vnd.oci.image.config.v1+json" \
            "baseline-rules.yaml.gz:${LAYER_MEDIA_TYPE}"

      - name: Validate pushed rules artifacts
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for repo in "$GHCR_REPOSITORY" "$QUAY_REPOSITORY" "$GITLAB_REPOSITORY"; do
            make rules-artifact-validate RULE_ARTIFACT_REF="${repo}:${RULES_VERSION}"
          done

      - name: Resolve GHCR digest
        id: digest
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          ref="$(oras resolve --full-reference "${GHCR_REPOSITORY}:${RULES_VERSION}")"
          digest="${ref#*@}"
          echo "ghcr_digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign versioned rules artifacts
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for repo in "$GHCR_REPOSITORY" "$QUAY_REPOSITORY" "$GITLAB_REPOSITORY"; do
            ref="$(oras resolve --full-reference "${repo}:${RULES_VERSION}")"
            cosign sign --yes "$ref"
          done

      - name: Verify cosign v3 signature bundles
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for repo in "$GHCR_REPOSITORY" "$QUAY_REPOSITORY" "$GITLAB_REPOSITORY"; do
            ref="$(oras resolve --full-reference "${repo}:${RULES_VERSION}")"
            found=""
            while IFS= read -r sigref; do
              manifest="$(oras manifest fetch "$sigref")"
              if jq -e \
                --arg digest "${ref#*@}" \
                '.artifactType == "application/vnd.dev.sigstore.bundle.v0.3+json"
                 and .annotations["dev.sigstore.bundle.predicateType"] == "https://sigstore.dev/cosign/sign/v1"
                 and .subject.digest == $digest
                 and any(.layers[]?; .mediaType == "application/vnd.dev.sigstore.bundle.v0.3+json")' \
                >/dev/null <<<"$manifest"; then
                found=1
                break
              fi
            done < <(oras discover --format json "$ref" | jq -r '.referrers[]?.reference')
            test -n "$found" || { echo "::error::cosign v3 signature bundle not found for $ref"; exit 1; }
          done

      - name: Attest SLSA build provenance (bundle)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/baseline-rules.yaml.gz

      - name: Attest SLSA build provenance (GHCR image)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/cicd-sensor/cicd-sensor-rules
          subject-digest: ${{ steps.digest.outputs.ghcr_digest }}
          push-to-registry: true
          create-storage-record: true

      - name: Promote rules artifact to v1
        env:
          RULES_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for repo in "$GHCR_REPOSITORY" "$QUAY_REPOSITORY" "$GITLAB_REPOSITORY"; do
            oras copy "${repo}:${RULES_VERSION}" "${repo}:v1"
          done

  finalize:
    name: Tag release
    needs: [validate, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true

      - name: Create annotated tag as dispatcher
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
          REF_TAG: ${{ needs.validate.outputs.ref_tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name  "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git tag -a "$REF_TAG" \
            -m "Rules release ${VERSION} dispatched by @${ACTOR} (run ${RUN_ID})"
          git push origin "$REF_TAG"
